<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김나은 | 포트폴리오 (Content Planner Portfolio)</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Background Wallpaper -->
  <div class="desktop-wallpaper"></div>

  <!-- macOS Top Menu Bar -->
  <div class="menu-bar">
    <div class="menu-bar-left">
      <span class="menu-item apple-logo"></span>
      <span class="menu-item" style="font-weight: 700;">Finder</span>
      <span class="menu-item">파일</span>
      <span class="menu-item">편집</span>
      <span class="menu-item">보기</span>
      <span class="menu-item">이동</span>
      <span class="menu-item">윈도우</span>
      <span class="menu-item">도움말</span>
    </div>
    <div class="menu-bar-right">
      <span class="menu-item" id="wifi-status">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      </span>
      <span class="menu-item" id="battery-status">100% 🔋</span>
      <span class="menu-item" id="live-time">00:00 AM</span>
    </div>
  </div>

  <!-- macOS Desktop Canvas with Icons -->
  <div class="desktop-canvas" id="desktop-canvas">
    <!-- Desktop Icons will be loaded here via JS or static -->
    <div class="desktop-icon" data-type="file" data-id="about_me" onclick="desktopIconClick(this, event)" ondblclick="openFile('about_me')">
      <div class="desktop-icon-img">
        <!-- RTF Text Icon -->
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="4" width="48" height="56" rx="6" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="2"/>
          <path d="M42 4H56V18L42 4Z" fill="#E5E5EA"/>
          <rect x="16" y="24" width="32" height="4" rx="2" fill="#FF453A"/>
          <rect x="16" y="34" width="32" height="3" rx="1.5" fill="#8E8E93"/>
          <rect x="16" y="42" width="24" height="3" rx="1.5" fill="#8E8E93"/>
          <rect x="16" y="50" width="16" height="3" rx="1.5" fill="#C7C7CC"/>
        </svg>
      </div>
      <div class="desktop-icon-label">about_me.rtf</div>
    </div>

    <div class="desktop-icon" data-type="file" data-id="skills_motto" onclick="desktopIconClick(this, event)" ondblclick="openFile('skills_motto')">
      <div class="desktop-icon-img">
        <!-- PDF Icon -->
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="4" width="48" height="56" rx="6" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="2"/>
          <path d="M42 4H56V18L42 4Z" fill="#FF3B30"/>
          <rect x="16" y="28" width="32" height="4" rx="2" fill="#FF3B30"/>
          <text x="18" y="22" fill="#FF3B30" font-family="Arial" font-size="10" font-weight="900">PDF</text>
          <rect x="16" y="38" width="32" height="2" rx="1" fill="#8E8E93"/>
          <rect x="16" y="44" width="32" height="2" rx="1" fill="#8E8E93"/>
          <rect x="16" y="50" width="20" height="2" rx="1" fill="#C7C7CC"/>
        </svg>
      </div>
      <div class="desktop-icon-label">skills_&_motto.pdf</div>
    </div>

    <div class="desktop-icon" data-type="folder" data-id="projects" onclick="desktopIconClick(this, event)" ondblclick="navigateToFolder('projects')">
      <div class="desktop-icon-img">
        <!-- Folder Icon -->
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 14C4 10.6863 6.68629 8 10 8H22C24.4795 8 26.7417 9.35825 27.8767 11.5283L29.1233 13.9117C29.6908 14.9968 30.822 15.6757 32.0409 15.6757H54C57.3137 15.6757 60 18.362 60 21.6757V50C60 53.3137 57.3137 56 54 56H10C6.68629 56 4 53.3137 4 50V14Z" fill="url(#folderGrad)"/>
          <path d="M4 20C4 17.7909 5.79086 16 8 16H56C58.2091 16 60 17.7909 60 20V50C60 53.3137 57.3137 56 54 56H10C6.68629 56 4 53.3137 4 50V20Z" fill="url(#folderFrontGrad)"/>
          <defs>
            <linearGradient id="folderGrad" x1="4" y1="8" x2="60" y2="56" gradientUnits="userSpaceOnUse">
              <stop stop-color="#0A84FF"/>
              <stop offset="1" stop-color="#0056B3"/>
            </linearGradient>
            <linearGradient id="folderFrontGrad" x1="4" y1="16" x2="60" y2="56" gradientUnits="userSpaceOnUse">
              <stop stop-color="#3095FF"/>
              <stop offset="1" stop-color="#ffaab9"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="desktop-icon-label">Projects</div>
    </div>
  </div>

  <!-- Main Finder Window (Open by default, draggable) -->
  <div class="finder-window mac-window active" id="finder-window" style="top: 80px; left: 120px;">
    <!-- Titlebar / Header -->
    <div class="window-titlebar" id="finder-titlebar">
      <div class="window-controls">
        <button class="control-btn close" onclick="closeFinder()"></button>
        <button class="control-btn minimize" onclick="minimizeFinder()"></button>
        <button class="control-btn maximize" onclick="toggleMaximizeFinder()"></button>
      </div>
      <div class="window-title" id="finder-title">김나은 포트폴리오 - Finder</div>
    </div>

    <!-- Toolbar / Secondary Nav -->
    <div class="finder-header">
      <div class="finder-nav-controls">
        <div class="nav-arrows">
          <button class="nav-arrow-btn" id="nav-back-btn" onclick="navigateHistoryBack()" disabled title="뒤로 가기">
            <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
          </button>
          <button class="nav-arrow-btn" id="nav-forward-btn" onclick="navigateHistoryForward()" disabled title="앞으로 가기">
            <svg viewBox="0 0 24 24"><path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z"/></svg>
          </button>
        </div>
        <div class="finder-path-title" id="finder-current-path">
          <span>Overview</span>
        </div>
      </div>

      <div class="finder-actions">
        <!-- View Toggle (Grid / List) -->
        <div class="view-switcher">
          <button class="view-btn active" id="view-grid-btn" onclick="switchFinderView('grid')" title="아이콘 격자 보기">
            <svg viewBox="0 0 24 24"><path d="M4,4H10V10H4V4M14,4H20V10H14V4M4,14H10V20H4V14M14,14H20V20H14V14Z"/></svg>
          </button>
          <button class="view-btn" id="view-list-btn" onclick="switchFinderView('list')" title="목록 보기">
            <svg viewBox="0 0 24 24"><path d="M4,5H20V7H4V5M4,11H20V13H4V11M4,17H20V19H4V17Z"/></svg>
          </button>
        </div>
        <!-- Search bar -->
        <div class="search-container">
          <span class="search-icon">
            <svg viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
          </span>
          <input type="text" class="search-input" id="finder-search" placeholder="검색" oninput="handleSearch(this.value)">
        </div>
      </div>
    </div>

    <!-- Explorer body with Sidebar & Workspace Grid -->
    <div class="finder-body">
      <!-- Left Sidebar -->
      <aside class="finder-sidebar">
        <div class="sidebar-group">
          <div class="sidebar-group-title">위치</div>
          <a class="sidebar-item active" data-nav="overview" onclick="sidebarNavigate('overview')">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
            </span>
            Overview
          </a>
        </div>

        <div class="sidebar-group">
          <div class="sidebar-group-title">Selected Work</div>
          <a class="sidebar-item" data-nav="projects" onclick="sidebarNavigate('projects')">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </span>
            All Projects
          </a>
          <a class="sidebar-item" data-nav="project_pbl" onclick="sidebarNavigate('project_pbl')">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>
            </span>
            PBL 골목길 개선
          </a>
          <a class="sidebar-item" data-nav="project_volunteer" onclick="sidebarNavigate('project_volunteer')">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>
            </span>
            날개없는천사 봉사
          </a>
        </div>

        <div class="sidebar-group">
          <div class="sidebar-group-title">Activities</div>
          <a class="sidebar-item" data-nav="act_booth" onclick="sidebarNavigate('act_booth')">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#ff9f0a" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
            </span>
            심리학 축제 부스
          </a>
          <a class="sidebar-item" data-nav="act_poster" onclick="sidebarNavigate('act_poster')">
            <span class="sidebar-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#30d158" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
            </span>
            애플데이 포스터
          </a>
        </div>

        <div class="sidebar-group">
          <div class="sidebar-group-title">태그</div>
          <a class="sidebar-item" onclick="filterByTag('branding')">
            <span class="tag-dot red"></span>뷰티 브랜딩
          </a>
          <a class="sidebar-item" onclick="filterByTag('content')">
            <span class="tag-dot green"></span>SNS 콘텐츠
          </a>
          <a class="sidebar-item" onclick="filterByTag('experience')">
            <span class="tag-dot orange"></span>경험/활동
          </a>
        </div>
      </aside>

      <!-- Right main view showing workspace -->
      <main class="finder-workspace" id="finder-workspace">
        <!-- Rendered dynamically by index.js based on current view/path -->
      </main>
    </div>
  </div>

  <!-- macOS Dock at the bottom -->
  <div class="dock-container">
    <div class="dock-item running" data-tooltip="Finder" onclick="openFinder()">
      <!-- macOS Finder Icon -->
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="16" fill="url(#finderBg)"/>
        <path d="M12 32C12 20.9543 20.9543 12 32 12C32 12 28.5 24 32 32C35.5 40 40 40 40 40H52V52C52 52 40 52 32 52C20.9543 52 12 43.0457 12 32Z" fill="#8CE0FF"/>
        <path d="M32 12C43.0457 12 52 20.9543 52 32C52 43.0457 43.0457 52 32 52V12Z" fill="#ffaab9"/>
        <!-- smile and nose outline -->
        <path d="M22 36C22 36 24.5 39 32 39C39.5 39 42 36 42 36" stroke="#001F4D" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M32 12V32" stroke="#001F4D" stroke-width="2.5"/>
        <path d="M28 32H36" stroke="#001F4D" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Eyes -->
        <circle cx="23" cy="25" r="3" fill="#001F4D"/>
        <circle cx="41" cy="25" r="3" fill="#001F4D"/>
        <defs>
          <linearGradient id="finderBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#E8F4FF"/>
            <stop offset="1" stop-color="#A9D4FF"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="dock-indicator"></div>
    </div>

    <div class="dock-item" data-tooltip="자기소개 (about_me.rtf)" onclick="openFile('about_me')">
      <!-- TextEdit style icon -->
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="16" fill="#F4F4F9" stroke="#E5E5EA" stroke-width="1"/>
        <rect x="12" y="12" width="40" height="40" rx="4" fill="#FFFFFF" stroke="#D1D1D6" stroke-width="1"/>
        <!-- Red writing tool style -->
        <path d="M46 16L32 30" stroke="#FF453A" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Small writing lines -->
        <line x1="18" y1="20" x2="32" y2="20" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="28" x2="46" y2="28" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="36" x2="46" y2="36" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="44" x2="36" y2="44" stroke="#C7C7CC" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="dock-indicator"></div>
    </div>

    <div class="dock-item" data-tooltip="강점/관심사 (skills_&_motto.pdf)" onclick="openFile('skills_motto')">
      <!-- Preview/PDF icon -->
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="16" fill="url(#previewBg)"/>
        <!-- Folded document sheet -->
        <path d="M18 14H40L48 22V50C48 51.1046 47.1046 52 46 52H18C16.8954 52 16 51.1046 16 50V16C16 14.8954 16.8954 14 18 14Z" fill="#FFFFFF"/>
        <path d="M40 14V22H48L40 14Z" fill="#A8D4FF"/>
        <!-- Compass/Preview drawing logo -->
        <circle cx="30" cy="36" r="8" stroke="#ffaab9" stroke-width="2"/>
        <line x1="30" y1="31" x2="30" y2="41" stroke="#ffaab9" stroke-width="2"/>
        <line x1="25" y1="36" x2="35" y2="36" stroke="#ffaab9" stroke-width="2"/>
        <defs>
          <linearGradient id="previewBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7ADBFF"/>
            <stop offset="1" stop-color="#0066FF"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="dock-indicator"></div>
    </div>

    <div class="dock-item" data-tooltip="이메일 문의하기" onclick="window.location.href='mailto:20269106@hallym.ac.kr'">
      <!-- Mail Icon -->
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="16" fill="url(#mailBg)"/>
        <!-- Envelope body -->
        <rect x="14" y="20" width="36" height="24" rx="4" fill="#FFFFFF"/>
        <!-- Envelope flaps -->
        <path d="M14 20L32 32L50 20" stroke="#ffaab9" stroke-width="2" stroke-linejoin="round"/>
        <path d="M14 44L28 32M50 44L36 32" stroke="#B3D7FF" stroke-width="2"/>
        <defs>
          <linearGradient id="mailBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#54C7FC"/>
            <stop offset="1" stop-color="#ffaab9"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

  <!-- Draggable custom window overlays container -->
  <div id="spawned-windows-container"></div>

  <!-- Custom Scripts -->
  <script src="index.js"></script>
</body>
</html>
